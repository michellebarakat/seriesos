<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discover — SeriesOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="mainNav">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span class="brand-os">Series</span><span class="brand-highlight">OS</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="collection.html">My Collection</a></li>
            <li class="nav-item"><a class="nav-link active" href="discover.html">Discover</a></li>
            <li class="nav-item"><a class="nav-link" href="quiz.html">Quiz</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- PAGE HEADER -->
    <div class="page-header">
      <div class="container">
        <h1 class="page-title">Discover</h1>
        <p class="text-secondary mt-2">Search any show or movie from the TMDB database.</p>
        <div class="search-bar-wrapper mt-4">
          <i class="bi bi-search search-icon"></i>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search for a show or movie..."
            autocomplete="off"
          />
        </div>
      </div>
    </div>

    <!-- RESULTS GRID -->
    <section class="py-5">
      <div class="container">
        <p class="text-secondary mb-4" id="resultsLabel">Showing popular TV shows</p>
        <div class="row g-4" id="discoverGrid">
          <div class="col-12 text-center loading-state">
            <div class="spinner-border" role="status"></div>
            <p class="mt-2">Loading popular shows...</p>
          </div>
        </div>
        <div class="d-flex justify-content-center gap-3 mt-5" id="pagination">
          <button class="btn btn-outline-secondary" id="prevBtn" disabled>
            <i class="bi bi-chevron-left"></i> Prev
          </button>
          <span class="align-self-center text-secondary" id="pageInfo">Page 1</span>
          <button class="btn btn-outline-primary" id="nextBtn">
            Next <i class="bi bi-chevron-right"></i>
          </button>
        </div>
      </div>
    </section>

    <!-- MODAL -->
    <div class="modal fade" id="discoverModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <img id="discModalBackdrop" src="" alt="" class="modal-backdrop-img" />
          <div class="modal-poster-wrapper">
            <img id="discModalPoster" src="" alt="" class="modal-poster" />
            <div class="modal-meta">
              <h2 class="modal-title-text" id="discModalTitle"></h2>
              <p class="modal-rating" id="discModalRating"></p>
              <span class="modal-category" id="discModalType"></span>
              <p class="modal-text mt-2" id="discModalYear"></p>
              <div id="discModalDetails" class="modal-details mt-2"></div>
            </div>
          </div>
          <div class="modal-body-content">
            <p class="modal-section-label">Overview</p>
            <p class="modal-text" id="discModalOverview"></p>
            <div id="discModalTrailer" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="container text-center">
        <p class="footer-brand">Series<span class="brand-highlight">OS</span></p>
        <p class="footer-sub">Built with way too many hours of watching TV.</p>
        <div class="footer-links">
          <a href="index.html">Home</a>
          <a href="collection.html">Collection</a>
          <a href="discover.html">Discover</a>
          <a href="about.html">About</a>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.querySelectorAll('#navMenu .nav-link').forEach(link => {
        link.addEventListener('click', () => {
          const navCollapse = document.getElementById('navMenu');
          if (navCollapse.classList.contains('show')) {
            new bootstrap.Collapse(navCollapse).hide();
          }
        });
      });
    </script>
    <script type="module" src="js/discover.js"></script>
  </body>
</html>
