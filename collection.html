<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Collection — SeriesOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="mainNav">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span class="brand-os">Series</span><span class="brand-highlight">OS</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link active" href="collection.html">My Collection</a></li>
            <li class="nav-item"><a class="nav-link" href="discover.html">Discover</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- PAGE HEADER -->
    <div class="page-header">
      <div class="container">
        <h1 class="page-title">My Collection</h1>
        <p class="text-secondary mt-2">
          30 hand-picked shows across 6 categories — with my own take on each one.
        </p>

        <!-- FILTER BUTTONS -->
        <div class="filter-bar mt-4" id="filterBar">
          <button class="filter-btn active" data-category="All">All</button>
          <button class="filter-btn" data-category="Crime & Thrillers">Crime & Thrillers</button>
          <button class="filter-btn" data-category="K-Dramas">K-Dramas</button>
          <button class="filter-btn" data-category="Reality & Competition">Reality & Competition</button>
          <button class="filter-btn" data-category="Teen & Young Adult">Teen & Young Adult</button>
          <button class="filter-btn" data-category="Must-Watch / OG Classics">Must-Watch / OG Classics</button>
          <button class="filter-btn" data-category="Superhero / Action">Superhero / Action</button>
        </div>
      </div>
    </div>

    <!-- COLLECTION GRID -->
    <section class="py-5">
      <div class="container">
        <div class="row g-4" id="collectionGrid">
          <!-- Populated by collection.js -->
          <div class="col-12 text-center loading-state">
            <div class="spinner-border" role="status"></div>
            <p class="mt-2">Loading your collection...</p>
          </div>
        </div>
      </div>
    </section>

    <!-- MODAL (your unique UI requirement) -->
    <!-- Custom modal popup for detailed item view — Michelle Barakat unique requirement -->
    <div class="modal fade" id="showModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">

          <!-- Close button -->
          <div class="modal-header">
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>

          <!-- Backdrop image -->
          <img id="modalBackdrop" src="" alt="" class="modal-backdrop-img" />

          <!-- Poster + meta -->
          <div class="modal-poster-wrapper">
            <img id="modalPoster" src="" alt="" class="modal-poster" />
            <div class="modal-meta">
              <h2 class="modal-title-text" id="modalTitle"></h2>
              <p class="modal-rating" id="modalRating"></p>
              <span class="modal-category" id="modalCategory"></span>
              <p class="modal-text mt-2" id="modalYear"></p>
              <div id="modalDetails" class="modal-details mt-2"></div>
            </div>
          </div>

          <!-- Body content -->
          <div class="modal-body-content">
            <p class="modal-section-label">Overview</p>
            <p class="modal-text" id="modalOverview"></p>

            <p class="modal-section-label">My Take</p>
            <p class="modal-text" id="modalReview"></p>
          </div>

        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="container text-center">
        <p class="footer-brand">Series<span class="brand-highlight">OS</span></p>
        <p class="footer-sub">Built with way too many hours of watching TV.</p>
        <div class="footer-links">
          <a href="index.html">Home</a>
          <a href="collection.html">Collection</a>
          <a href="discover.html">Discover</a>
          <a href="about.html">About</a>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/collection.js"></script>
  </body>
</html>
